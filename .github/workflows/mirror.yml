name: Mirror images to GHCR

on:
  push:
    branches: [main]
    paths:
      - images.yaml
      - Dockerfile
      - .github/workflows/mirror.yml
  workflow_dispatch: {}
  schedule:
    # Weekly, Monday 04:17 UTC — re-pull upstream to pick up base-image patches.
    - cron: "17 4 * * 1"

# Least-privilege: only what's needed to push packages to this org's GHCR.
permissions:
  contents: read
  packages: write

concurrency:
  group: mirror-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Scrape current upstream tags from MCR and emit the JSON build matrix.
  # The per-run summary (what was selected) is on stderr -> visible in the log.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.gen.outputs.images }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install --quiet pyyaml
      - id: gen
        run: |
          echo "images=$(python scripts/discover.py)" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Throttle pulls from MCR — firing all builds at once bursts MCR's
      # anonymous token endpoint and trips its per-IP 429 rate limit (the very
      # thing this repo exists to avoid). Thin passthrough builds are fast, so
      # serializing them costs only a few minutes on a weekly job.
      max-parallel: 1
      matrix:
        image: ${{ fromJson(needs.matrix.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute build date tag
        id: meta
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ matrix.image.source }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ matrix.image.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ matrix.image.tag }}-${{ steps.meta.outputs.date }}
