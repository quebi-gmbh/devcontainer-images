name: Build devcontainer images (from source) → GHCR

# Rebuilds the devcontainer image chain from upstream source and publishes to
# ghcr.io/<owner>/*. We build instead of mirror because pulling the published
# images from MCR 429s on GitHub's shared runner IPs (the base comes from
# Docker Hub via mirror.gcr.io, so we never hit MCR). See scripts/build-image.sh.

on:
  push:
    branches: [main]
    paths:
      - chain.json
      - scripts/build-image.sh
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      only_variant:
        description: "Build only this variant (e.g. 24-trixie). Blank = all."
        type: string
        default: ""
      platforms:
        description: "Target platforms."
        type: string
        default: "linux/amd64,linux/arm64"
  schedule:
    # Weekly, Monday 04:17 UTC — rebuild to pick up upstream base/apt patches.
    - cron: "17 4 * * 1"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.v.outputs.sha }}
      variants: ${{ steps.v.outputs.variants }}
      date: ${{ steps.v.outputs.date }}
      platforms: ${{ steps.v.outputs.platforms }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        env:
          ONLY_VARIANT: ${{ inputs.only_variant }}
        run: |
          set -euo pipefail
          repo=$(jq -r .upstream.repo chain.json)
          ref=$(jq -r .upstream.ref chain.json)
          # Resolve the ref to a commit ONCE so every job in this run agrees,
          # while still tracking the most recent upstream across runs.
          sha=$(git ls-remote "https://github.com/${repo}.git" "$ref" | cut -f1)
          [ -n "$sha" ] || { echo "::error::could not resolve ${repo}@${ref}"; exit 1; }
          echo "resolved ${repo}@${ref} -> ${sha}"

          # Shallow-fetch that commit to read each image's manifest.json, which
          # is the source of truth for the variant list (nothing hardcoded).
          tmp=$(mktemp -d)
          git -C "$tmp" init -q
          git -C "$tmp" remote add origin "https://github.com/${repo}.git"
          git -C "$tmp" -c protocol.version=2 fetch -q --depth 1 origin "$sha"
          git -C "$tmp" checkout -q FETCH_HEAD

          map='{}'
          for src in $(jq -r '.images[].src' chain.json); do
            vs=$(jq -c '.variants' "$tmp/src/$src/manifest.json")
            map=$(echo "$map" | jq -c --arg s "$src" --argjson v "$vs" '. + {($s): $v}')
          done
          # workflow_dispatch can restrict to a single variant for cheap tests.
          if [ -n "${ONLY_VARIANT}" ]; then
            map=$(echo "$map" | jq -c --arg v "$ONLY_VARIANT" 'map_values([$v])')
          fi
          echo "variants: $map"

          {
            echo "sha=$sha"
            echo "variants=$map"
            echo "platforms=${{ inputs.platforms || 'linux/amd64,linux/arm64' }}"
            echo "date=$(date -u +%Y%m%d)"
          } >> "$GITHUB_OUTPUT"

  # Tier 1: FROM Docker Hub node (via mirror.gcr.io) — no dependency.
  javascript-node:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.variants)['javascript-node'] }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build javascript-node:${{ matrix.variant }}
        env:
          OWNER: ${{ github.repository_owner }}
          UP_SHA: ${{ needs.setup.outputs.sha }}
          PLATFORMS: ${{ needs.setup.outputs.platforms }}
          BUILD_DATE: ${{ needs.setup.outputs.date }}
        run: scripts/build-image.sh javascript-node "${{ matrix.variant }}" devcontainer-javascript-node dockerhub-node

  # Tier 2: FROM our javascript-node — must run after tier 1 is published.
  typescript-node:
    needs: [setup, javascript-node]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.variants)['typescript-node'] }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build typescript-node:${{ matrix.variant }}
        env:
          OWNER: ${{ github.repository_owner }}
          UP_SHA: ${{ needs.setup.outputs.sha }}
          PLATFORMS: ${{ needs.setup.outputs.platforms }}
          BUILD_DATE: ${{ needs.setup.outputs.date }}
        run: scripts/build-image.sh typescript-node "${{ matrix.variant }}" devcontainer-typescript-node javascript-node
